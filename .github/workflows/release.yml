# vim: set ft=yaml fenc=utf-8 ff=unix sw=2 ts=2 et :
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          "version=$v" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Build
        run: task release VERSION=${{ steps.ver.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: out/tally-${{ steps.ver.outputs.version }}-x64.zip
